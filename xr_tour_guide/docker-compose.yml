version: '3.8'

networks:
  backend_net:
    external: true

services:
  db:
    image: mysql:8.0
    container_name: mysql_db_tour_guide
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data_xr_tour_guide:/var/lib/mysql
    networks:
      - backend_net

  web:
    build: .
    container_name: xr_tour_guide
    volumes:
      - .:/workspace
      - ./staticfiles:/workspace/staticfiles
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - 8001
    depends_on:
      - db
      - redis
    env_file:
      - .env
    restart: always
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health_check/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  celery:
    build: .
    container_name: xr_tour_guide_celery
    command: celery -A xr_tour_guide worker --concurrency=1 --loglevel=info
    volumes:
      - .:/workspace
    depends_on:
      - web
      - redis
    env_file:
      - .env
    networks:
      - backend_net

  celery-beat:
    build: .
    container_name: xr_tour_guide_celery_beat
    command: celery -A xr_tour_guide beat --loglevel=info
    volumes:
      - .:/workspace
    depends_on:
      - web
      - redis
    env_file:
      - .env
    restart: always
    networks:
      - backend_net

  redis:
    image: redis:7
    container_name: redis_tour_guide
    env_file:
      - .env
    networks:
    - backend_net

  nginx:
    image: nginx:latest
    container_name: nginx_proxy_tour_guide
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./staticfiles:/workspace/staticfiles
      - ../xr_tour_guide_unisa/staticfiles:/workspace/staticfiles_unisa
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      web:
        condition: service_healthy
    networks:
      - backend_net

  minio:
    # image: minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: minio_tour_guide
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    expose:
      - "9000"
    ports:
      - "127.0.0.1:9001:9001" # console
    volumes:
      - minio_data:/data
    networks:
      - backend_net

  createbuckets:
    # image: minio/mc@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c '
      until /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo "Waiting for MinIO to be ready...";
        sleep 5;
      done;
      /usr/bin/mc mb --quiet myminio/${AWS_STORAGE_BUCKET_NAME} || true;
      /usr/bin/mc anonymous set none myminio/${AWS_STORAGE_BUCKET_NAME} || true;
      '
    networks:
      - backend_net
    
  ai_training:
    build: 
      context: ../AI_classification
      dockerfile: training/Dockerfile
    container_name: ai_training_tour_guide
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    # gpus: all
    user: root
    expose:
      - "8090"
    networks:
     - backend_net

  ai_inference:
    build:
      context: ../AI_classification
      dockerfile: inference/Dockerfile
    container_name: ai_inference_tour_guide
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    # gpus: all
    user: root
    expose:
      - "8050"
    networks:
      - backend_net

